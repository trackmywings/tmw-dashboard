  .fm-summary {
    font-size: 13px;

    background: var(--bg-card);
    border: 1px solid var(--line-soft);
    border-radius: var(--r-md);
    padding: 10px var(--sp-md);
    margin-bottom: var(--sp-md);
    font-size: 12px;
    color: var(--ink-mid);
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;

  .fm-breadcrumb.show { display: flex; }
  .fm-breadcrumb .fm-bc-path {
    flex: 1;
    color: var(--ink-hi);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    word-break: break-all;
  }
  .fm-breadcrumb .fm-bc-sep { color: var(--ink-low); margin: 0 4px; }
  .fm-breadcrumb button {
    background: var(--gold-tint);
    color: var(--gold);
    border: none;
    padding: 5px 10px;
    border-radius: var(--r-sm);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: filter var(--t-fast) var(--ease);
  }
  .fm-breadcrumb button:hover { background: var(--gold); color: var(--bg-base); }
  .fm-bc-close {
    background: transparent !important;
    color: var(--ink-low) !important;
    border: 1px solid var(--line) !important;
    margin-left: 4px;
    padding: 4px 9px !important;
    font-size: 13px !important;
    line-height: 1 !important;

  .fm-bc-close:hover { color: var(--ink-hi) !important; border-color: var(--gold) !important; background: transparent !important; }

    background: var(--bg-card);
    border: 1px solid var(--line-soft);
    border-radius: var(--r-lg);
    padding: var(--sp-md) 0;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.7;

    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 16px 2px 8px;
    cursor: default;
    user-select: none;
    border-radius: 0;

  .fm-node.fm-folder { color: var(--ink-hi); font-weight: 500; }
  .fm-node.fm-file   { color: var(--ink-mid); }
  .fm-node.fm-match  { background: var(--gold-tint-soft); }
  .fm-node.fm-match .fm-name { color: var(--gold); font-weight: 600; }
  .fm-node.fm-selected { background: var(--gold-tint); }
  .fm-node.fm-selected .fm-name { color: var(--gold); font-weight: 600; }

  .fm-node.fm-depth-1 { font-size: 13.5px; font-weight: 600; }
  .fm-node.fm-depth-2 { font-size: 13px; }
  .fm-node.fm-depth-3 { font-size: 12.5px; }
  .fm-node.fm-depth-4 { font-size: 12px; color: var(--ink-mid); }
  .fm-node.fm-depth-5,
  .fm-node.fm-depth-6,
  .fm-node.fm-depth-7 { font-size: 11.5px; color: var(--ink-low); }

  .fm-toggle {
    width: 14px;
    color: var(--ink-low);
    display: inline-block;
    text-align: center;
    transition: transform var(--t-fast) var(--ease);
    flex-shrink: 0;

  .fm-toggle.fm-leaf { visibility: hidden; }

  .fm-icon {
    width: 16px;
    text-align: center;
    flex-shrink: 0;
    color: var(--ink-low);

  .fm-folder .fm-icon { color: var(--gold); }

  .fm-meta { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    margin-left: 24px;
    border-left: 1px solid var(--line-soft);
    padding-left: 0;

    color: var(--ink-mid);

const PASSWORD_HASH = '22900e4738455f5c92593a95b6e0c5d228698a80385e4f1f2d272e8f8f49aec6';
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
function unlock() { document.body.classList.add('unlocked'); document.getElementById('loginOverlay').style.display = 'none'; }
if (sessionStorage.getItem('tmw_auth') === 'true') unlock();
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const hash = await sha256(document.getElementById('password').value);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem('tmw_auth', 'true');
    unlock();
  } else {
    const err = document.getElementById('loginError');
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 2000);
    document.getElementById('password').value = '';
  }
});

// --- Dept badge mapping (3 visual variants from 12 logical depts per One-Hue-One-Job) ---
function deptBadgeClass(dept) {
  if (dept === 'Finance') return 'ds-badge-dept-finance';
  if (dept === 'Legal') return 'ds-badge-dept-legal';
  if (['Archive','Customer Success','People','Sales'].includes(dept)) return 'ds-badge-dept-other';
  return 'ds-badge-dept';
}

function fileIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  if (['md','txt'].includes(ext)) return '◫';
  if (['xlsx','xls','csv'].includes(ext)) return '▦';
  if (['docx','doc','rtf'].includes(ext)) return '▤';
  if (['pdf'].includes(ext)) return '▥';
  if (['html','htm'].includes(ext)) return '⌖';
  if (['png','jpg','jpeg','gif','svg','webp'].includes(ext)) return '◇';
  if (['py','js','mjs','ts','tsx','sh'].includes(ext)) return '⌬';
  if (['json','yaml','yml','toml'].includes(ext)) return '⌗';
  if (['zip','tar','gz'].includes(ext)) return '◰';
  return '·';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

let nodeIdCounter = 0;

function renderNode(node, depth, parentPath) {
  const myPath = parentPath ? parentPath + '/' + node.name : node.name;
  const id = 'n' + (nodeIdCounter++);
  const isFolder = node.type === 'folder';
  const hasChildren = isFolder && node.children && node.children.length > 0;
  const dept = node.dept || '';
  const badgeClass = dept ? deptBadgeClass(dept) : '';
  const icon = isFolder ? (hasChildren ? '▣' : '▢') : fileIcon(node.name);
  const toggleClass = hasChildren ? 'fm-toggle' : 'fm-toggle fm-leaf';
  const nodeClass = `fm-node fm-${isFolder ? 'folder' : 'file'} fm-clickable fm-depth-${Math.min(depth, 7)}`;

  let html = `<div class="${nodeClass}" id="${id}" data-path="${escapeHtml(myPath)}" data-dept="${escapeHtml(dept)}" data-type="${escapeHtml(node.type)}" data-name="${escapeHtml(node.name.toLowerCase())}" onclick="onNodeClick(event, '${id}')">`;
  html += `<span class="${toggleClass}" onclick="toggleNode(event, '${id}')">▸</span>`;
  html += `<span class="fm-icon">${icon}</span>`;
  html += `<span class="fm-name">${escapeHtml(node.name)}</span>`;
  if (dept && depth <= 2) {
    html += `<span class="fm-meta"><span class="ds-badge ${badgeClass}">${escapeHtml(dept)}</span></span>`;
  }
  html += `</div>`;

  if (hasChildren) {
    const collapsed = depth >= 2 ? ' fm-collapsed' : '';
    html += `<div class="fm-children${collapsed}" id="${id}-c">`;
    for (const child of node.children) {
      html += renderNode(child, depth + 1, myPath);
    }
    html += '</div>';
  }
  return html;
}

document.getElementById('folderTree').innerHTML = renderNode(folderStructure, 0, '');

// --- Toggle / expand / collapse ---
function toggleNode(e, id) {
  if (e) e.stopPropagation();
  const toggle = document.querySelector('#' + id + ' .fm-toggle');
  const children = document.getElementById(id + '-c');
  if (!children) return;
  const isCollapsed = children.classList.contains('fm-collapsed');
  if (isCollapsed) {
    children.classList.remove('fm-collapsed');
    if (toggle) toggle.classList.add('fm-open');
  } else {
    children.classList.add('fm-collapsed');
    if (toggle) toggle.classList.remove('fm-open');
  }
}

function expandAll() {
  document.querySelectorAll('.fm-children').forEach(c => c.classList.remove('fm-collapsed'));
  document.querySelectorAll('.fm-toggle').forEach(t => { if (!t.classList.contains('fm-leaf')) t.classList.add('fm-open'); });
}

function collapseAll() {
  document.querySelectorAll('.fm-children').forEach(c => c.classList.add('fm-collapsed'));
  document.querySelectorAll('.fm-toggle').forEach(t => t.classList.remove('fm-open'));
}

// --- Click node → breadcrumb ---
let selectedPath = '';
function onNodeClick(e, id) {
  document.querySelectorAll('.fm-node.fm-selected').forEach(n => n.classList.remove('fm-selected'));
  const node = document.getElementById(id);
  if (!node) return;
  node.classList.add('fm-selected');
  selectedPath = node.dataset.path;
  const bc = document.getElementById('breadcrumb');
  document.getElementById('bcPath').textContent = selectedPath;
  bc.classList.add('show');
}

function copyPath() {
  if (!selectedPath) return;
  const btn = document.getElementById('copyBtn');
  const orig = btn.textContent;
  const restore = () => setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.background = ''; }, 1500);

  // Try the modern clipboard API first; fall back gracefully.
  const onSuccess = () => { btn.textContent = 'Copied'; restore(); };
  const onFail = (err) => {
    btn.textContent = 'Copy failed';
    btn.style.color = 'var(--danger)';
    btn.style.background = 'var(--danger-tint)';
    console.error('Clipboard write failed:', err);
    restore();
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(selectedPath).then(onSuccess).catch(onFail);
  } else {
    // Legacy fallback: temporary textarea + execCommand
    try {
      const ta = document.createElement('textarea');
      ta.value = selectedPath;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      ok ? onSuccess() : onFail(new Error('execCommand returned false'));
    } catch (err) {
      onFail(err);
    }
  }
}

function dismissBreadcrumb() {
  document.querySelectorAll('.fm-node.fm-selected').forEach(n => n.classList.remove('fm-selected'));
  selectedPath = '';
  document.getElementById('breadcrumb').classList.remove('show');
}

// --- Search + dept filter ---
function applyFilter() {
  const q = document.getElementById('treeSearch').value.toLowerCase().trim();
  const dept = document.getElementById('deptFilter').value;

  const allNodes = document.querySelectorAll('.fm-node');
  let matches = 0;

  allNodes.forEach(n => {
    n.classList.remove('fm-match');
  });

  if (!q && !dept) {
    allNodes.forEach(n => { n.style.display = ''; });
    document.querySelectorAll('.fm-children').forEach((c, i) => {
      // Restore default collapsed state (depth-2+)
      if (c.dataset.defaultCollapsed === '1') c.classList.add('fm-collapsed');
    });
    return;
  }

  // Hide everything first
  allNodes.forEach(n => { n.style.display = 'none'; });
  document.querySelectorAll('.fm-children').forEach(c => c.style.display = 'none');

  allNodes.forEach(n => {
    const name = n.dataset.name || '';
    const ndept = n.dataset.dept || '';
    const nameMatch = !q || name.includes(q);
    const deptMatch = !dept || ndept === dept;
    if (nameMatch && deptMatch) {
      matches++;
      n.classList.add('fm-match');
      // Show the matching node and all its ancestors
      let el = n;
      while (el && !el.classList.contains('fm-tree')) {
        if (el.classList && el.classList.contains('fm-node')) el.style.display = '';
        if (el.classList && el.classList.contains('fm-children')) {
          el.style.display = '';
          el.classList.remove('fm-collapsed');
        }
        el = el.parentElement;
      }
    }
  });

  // Show no-match state if zero
  let existing = document.querySelector('.fm-no-match');
  if (matches === 0) {
    if (!existing) {
      const div = document.createElement('div');
      div.className = 'fm-no-match';
      div.textContent = 'No files or folders match these filters.';
      document.getElementById('folderTree').appendChild(div);
    }
  } else if (existing) {
    existing.remove();
  }
}

document.getElementById('treeSearch').addEventListener('input', applyFilter);
document.getElementById('deptFilter').addEventListener('change', applyFilter);

// Mark default-collapsed children for restoration after filter clear
document.querySelectorAll('.fm-children.fm-collapsed').forEach(c => { c.dataset.defaultCollapsed = '1'; });

// "/" focuses search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT' && document.body.classList.contains('unlocked')) {
    e.preventDefault();
    document.getElementById('treeSearch').focus();
  }
  if (e.key === 'Escape') {
    // Esc behaves contextually: dismiss breadcrumb if visible, else clear filters.
    const bc = document.getElementById('breadcrumb');
    if (bc.classList.contains('show')) {
      dismissBreadcrumb();
    } else {
      document.getElementById('treeSearch').value = '';
      document.getElementById('deptFilter').value = '';
      applyFilter();
    }
  }
});
